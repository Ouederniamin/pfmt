<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c75"/>
      <stop offset="100%" style="stop-color:#0a3554"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Caduceus-inspired medical cross accent -->
  <line x1="256" y1="80" x2="256" y2="160" stroke="#c9a84c" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <circle cx="256" cy="76" r="10" fill="#c9a84c" opacity="0.6"/>
  <!-- FMT Letters -->
  <text x="256" y="340" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="200" fill="white" text-anchor="middle" letter-spacing="-8">FMT</text>
  <!-- Underline accent -->
  <rect x="96" y="380" width="320" height="6" rx="3" fill="#c9a84c" opacity="0.8"/>
  <!-- Subtitle -->
  <text x="256" y="440" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="48" fill="white" text-anchor="middle" opacity="0.7">MÉDECINE</text>
</svg>
